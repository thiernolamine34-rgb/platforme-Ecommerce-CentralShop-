events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  upstream backend {
    server app1:3001;
    server app2:3002;
  }

  upstream frontend {
    server frontend:3000;
  }

  server {
    listen 80;

    # ── Images uploadées ─────────────────────────────────────
    # CORRECTION : les images sont dans le volume uploads_data
    # partagé entre les instances app et nginx
    location /uploads/ {
      alias /app/uploads/;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # ── API Auth ──────────────────────────────────────────────
    location /api/auth/ {
      proxy_pass         http://backend/auth/;
      proxy_http_version 1.1;
      proxy_set_header   Host          $host;
      proxy_set_header   X-Real-IP     $remote_addr;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── API Produits ──────────────────────────────────────────
    location /api/produits/ {
      proxy_pass         http://backend/produits/;
      proxy_http_version 1.1;
      proxy_set_header   Host          $host;
      proxy_set_header   X-Real-IP     $remote_addr;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
      client_max_body_size 6m;
    }

    # ── API Panier ────────────────────────────────────────────
    location /api/panier/ {
      proxy_pass         http://backend/panier/;
      proxy_http_version 1.1;
      proxy_set_header   Host          $host;
      proxy_set_header   X-Real-IP     $remote_addr;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── API Stats ─────────────────────────────────────────────
    location /api/stats/ {
      proxy_pass         http://backend/stats/;
      proxy_http_version 1.1;
      proxy_set_header   Host          $host;
      proxy_set_header   X-Real-IP     $remote_addr;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── API Commandes ─────────────────────────────────────────
    location /api/commandes/ {
      proxy_pass         http://backend/commandes/;
      proxy_http_version 1.1;
      proxy_set_header   Host          $host;
      proxy_set_header   X-Real-IP     $remote_addr;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── Santé ─────────────────────────────────────────────────
    location /api/health {
      proxy_pass         http://backend/health;
      proxy_http_version 1.1;
      proxy_set_header   Host      $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Frontend React ────────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
